    # ========== 履歴作成 (改善: LLM → コードノード) ==========
    - data:
        code: |
          def main(prev_history: str, user_query: str, normalized_query: str, answer_text: str, clinic: str) -> dict:
              """
              会話履歴をコードで構築（LLM不要）。
              """
              new_entry = f"Q: {user_query}\nNQ: {normalized_query}\nClinic: {clinic}"

              if prev_history and prev_history.strip():
                  # 直近5件のみ保持（メモリ節約）
                  entries = prev_history.split("\n---\n")
                  entries.append(new_entry)
                  if len(entries) > 5:
                      entries = entries[-5:]
                  result = "\n---\n".join(entries)
              else:
                  result = new_entry

              return {"text": result}
        code_language: python3
        outputs:
          text:
            children: null
            type: string
        selected: false
        title: 履歴作成
        type: code
        variables:
        - value_selector:
          - conversation
          - query_history_text
          variable: prev_history
        - value_selector:
          - sys
          - query
          variable: user_query
        - value_selector:
          - '1763036637179'
          - structured_output
          - normalized_query
          variable: normalized_query
        - value_selector:
          - '1758709714372'
          - text
          variable: answer_text
        - value_selector:
          - conversation
          - clinic
          variable: clinic
