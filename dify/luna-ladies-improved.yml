    # ========== 院ステータス判定 (改善: LLM → コードノード) ==========
    - data:
        code: |
          def main(sys_query: str, current_clinic: str) -> dict:
              """
              院の選択判定をコードノードで実行（LLM不要）。
              ボタン押下（完全一致）のみを院選択として扱う。
              自由テキスト中の院名は誤判定しない。
              """
              selections = {
                  "横浜駅前院": "横浜駅前院",
                  "川崎駅前院": "川崎駅前院",
                  "町田駅前院": "町田駅前院",
                  "その他・決まっていない": "未定",
              }

              query = sys_query.strip()

              # 完全一致チェック（ボタン押下時）
              if query in selections:
                  return {
                      "clinic": selections[query],
                      "is_selection": True,
                      "text": f"院選択: {selections[query]}"
                  }

              # 現在の院を維持（自由テキストでは院を変更しない）
              return {
                  "clinic": current_clinic if current_clinic else "未選択",
                  "is_selection": False,
                  "text": ""
              }
        code_language: python3
        outputs:
          clinic:
            children: null
            type: string
          is_selection:
            children: null
            type: boolean
          text:
            children: null
            type: string
