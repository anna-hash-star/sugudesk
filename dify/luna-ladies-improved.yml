    # ========== DETECT_LANGUAGE (改善: LLM → コードノード) ==========
    - data:
        code: |
          import re

          def main(query: str) -> dict:
              """
              言語判定をコードノードで実行（LLM不要）。
              日本語・英語・韓国語・中国語（簡体/繁体）を判定。
              """
              has_hiragana = bool(re.search(r'[\u3040-\u309F]', query))
              has_katakana = bool(re.search(r'[\u30A0-\u30FF]', query))
              has_hangul = bool(re.search(r'[\uAC00-\uD7AF\u1100-\u11FF]', query))
              has_cjk = bool(re.search(r'[\u4E00-\u9FFF\u3400-\u4DBF]', query))
              has_latin = bool(re.search(r'[a-zA-Z]', query))

              # 繁体字特有の文字（簡体字には使われない代表的な字）
              traditional_chars = bool(re.search(r'[\u9AD4\u8B93\u6A23\u8209\u8A72\u5011\u904E\u8B80\u9032\u9032]', query))

              # ひらがな・カタカナがあれば日本語
              if has_hiragana or has_katakana:
                  return {"text": "japanese"}

              # ハングルがあれば韓国語
              if has_hangul:
                  return {"text": "korean"}

              # CJK漢字のみ（ひらがな/カタカナなし）
              if has_cjk and not has_hiragana and not has_katakana:
                  if traditional_chars:
                      return {"text": "chinese_traditional"}
                  return {"text": "chinese_simplified"}

              # ラテン文字のみ
              if has_latin and not has_cjk:
                  return {"text": "english"}

              # デフォルト: 日本語
              return {"text": "japanese"}
        code_language: python3
        outputs:
          text:
            children: null
            type: string
        selected: false
        title: DETECT_LANGUAGE
        type: code
        variables:
        - value_selector:
          - sys
          - query
          variable: query
      height: 102
      id: '1773189011503'
      position:
        x: 380
        y: 282
      type: custom
      width: 244

